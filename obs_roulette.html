<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OBS Roulette</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .roulette-stage {
      position: relative;
      display: none;
      width: 100vw;
      height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2vmin;
      padding: 3vmin;
    }

    body.roulette-live .roulette-stage {
      display: flex;
    }

    .roulette-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(82vw, 72vh);
      aspect-ratio: 1;
    }

    .roulette-pointer {
      position: absolute;
      top: -1.1vmin;
      left: 50%;
      z-index: 2;
      width: 0;
      height: 0;
      border-right: clamp(12px, 2vmin, 24px) solid transparent;
      border-left: clamp(12px, 2vmin, 24px) solid transparent;
      border-top: clamp(20px, 3.2vmin, 38px) solid #fff;
      filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.7));
      transform: translateX(-50%);
    }

    .roulette-wheel {
      display: block;
      width: 100%;
      height: 100%;
      border: max(2px, 0.45vmin) solid rgba(0, 0, 0, 0.78);
      border-radius: 50%;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.36);
      transform: rotate(0deg);
      transition: transform 0ms cubic-bezier(0.12, 0.72, 0.08, 1);
    }

    .roulette-winner {
      min-height: 1.35em;
      max-width: 96vw;
      overflow: hidden;
      color: #fff;
      font-size: clamp(20px, 6vmin, 58px);
      font-weight: 950;
      letter-spacing: 0;
      line-height: 1.15;
      opacity: 0;
      paint-order: stroke fill;
      text-align: center;
      text-overflow: ellipsis;
      text-shadow:
        0 4px 12px rgba(0, 0, 0, 0.9),
        0 0 6px rgba(0, 0, 0, 0.96);
      white-space: nowrap;
      -webkit-text-stroke: max(6px, 1vmin) rgba(0, 0, 0, 0.94);
    }

    body.has-result .roulette-winner {
      opacity: 1;
    }
  </style>
</head>
<body>
  <main class="roulette-stage" aria-label="룰렛 방송 화면">
    <div class="roulette-wrap">
      <div class="roulette-pointer" aria-hidden="true"></div>
      <canvas id="rouletteWheel" class="roulette-wheel"></canvas>
    </div>
    <div id="rouletteWinner" class="roulette-winner" aria-live="polite"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const room = sanitizeRoom(params.get("room") || params.get("r")) || "default";
    const stateEndpoint = `/state?room=${encodeURIComponent(room)}`;
    const rouletteColors = [
      "#86ef6f", "#ece86a", "#56c7ff", "#ff8a3d", "#c084fc",
      "#f472b6", "#34d399", "#facc15", "#60a5fa", "#fb7185",
      "#a3e635", "#f97316", "#22d3ee", "#e879f9", "#fef08a"
    ];
    const rouletteSpinDurations = [2000, 3000, 4000, 5000, 6000, 8000];
    const defaultRouletteSpinDuration = 3000;
    const statePollInterval = 100;
    const minimumVisibleSpinDuration = 2200;
    const visualSpinSettleDelay = 900;

    const wheel = document.getElementById("rouletteWheel");
    const winner = document.getElementById("rouletteWinner");
    const ctx = wheel.getContext("2d");
    let lastPayload = "";
    let lastRotation = 0;
    let lastSpinStartedAt = 0;
    let lastRoulette = null;
    let hasAppliedState = false;
    let localSpinEndsAt = 0;
    let localSpinTimer = 0;
    let localSpinFrame = 0;
    let displayRotation = 0;

    function sanitizeRoom(value) {
      return String(value || "")
        .trim()
        .replace(/[^a-zA-Z0-9_-]/g, "")
        .slice(0, 40);
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, number));
    }

    function sanitizeRouletteLabel(value, fallback) {
      const label = Array.from(String(value || "").trim()).slice(0, 7).join("");
      return label || fallback;
    }

    function normalizeManualProbability(value) {
      if (value === "" || value === null || value === undefined) return null;
      const number = Number(value);
      if (!Number.isFinite(number)) return null;
      return clampNumber(number, 0, 100, 0);
    }

    function getOptionWeight(option) {
      const weight = Number(option?.weight);
      return Number.isFinite(weight) && weight > 0 ? weight : 0;
    }

    function applyRouletteProbabilityWeights(options) {
      if (!options.length) return;

      const manualOptions = options.filter((option) => option.manualProbability !== null);
      const autoOptions = options.filter((option) => option.manualProbability === null);

      if (!manualOptions.length) {
        options.forEach((option) => {
          option.weight = 1;
        });
        return;
      }

      const manualSum = manualOptions.reduce((sum, option) => sum + Math.max(0, Number(option.manualProbability) || 0), 0);

      if (manualSum <= 0) {
        options.forEach((option) => {
          option.weight = option.manualProbability === null ? 1 : 0;
        });
      } else if (manualSum >= 100 || !autoOptions.length) {
        options.forEach((option) => {
          option.weight = option.manualProbability === null ? 0 : (Math.max(0, Number(option.manualProbability) || 0) / manualSum) * 100;
        });
      } else {
        const autoShare = (100 - manualSum) / autoOptions.length;
        options.forEach((option) => {
          option.weight = option.manualProbability === null ? autoShare : Math.max(0, Number(option.manualProbability) || 0);
        });
      }

      if (options.reduce((sum, option) => sum + getOptionWeight(option), 0) <= 0) {
        options.forEach((option) => {
          option.weight = 1;
        });
      }
    }

    function normalizeRouletteSpinDuration(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return defaultRouletteSpinDuration;
      return rouletteSpinDurations.reduce((best, current) => (
        Math.abs(current - number) < Math.abs(best - number) ? current : best
      ), rouletteSpinDurations[0]);
    }

    function normalizeRoulette(value) {
      const source = value && typeof value === "object" ? value : {};
      const count = clampNumber(source.count, 1, 15, 2);
      const rawOptions = Array.isArray(source.options) ? source.options : [];
      const options = [];
      const legacyWeightTotal = rawOptions.slice(0, count).reduce((sum, option) => {
        const weight = option && typeof option === "object" ? Number(option.weight) : 1;
        return sum + (Number.isFinite(weight) && weight > 0 ? weight : 0);
      }, 0);
      const hasManualProbability = rawOptions.slice(0, count).some((option) => (
        option && typeof option === "object" && option.manualProbability !== undefined && option.manualProbability !== null && option.manualProbability !== ""
      ));
      const hasLegacyCustomWeight = !hasManualProbability && rawOptions.slice(0, count).some((option) => {
        const weight = option && typeof option === "object" ? Number(option.weight) : 1;
        return Number.isFinite(weight) && Math.abs(weight - 1) > 0.0001;
      });

      for (let index = 0; index < count; index += 1) {
        const option = rawOptions[index] && typeof rawOptions[index] === "object" ? rawOptions[index] : {};
        const legacyWeight = Number(option.weight);
        const manualProbability = hasLegacyCustomWeight && legacyWeightTotal > 0
          ? ((Number.isFinite(legacyWeight) && legacyWeight > 0 ? legacyWeight : 0) / legacyWeightTotal) * 100
          : normalizeManualProbability(option.manualProbability);
        options.push({
          label: sanitizeRouletteLabel(option.label, `선택지 ${index + 1}`),
          weight: 1,
          manualProbability
        });
      }
      applyRouletteProbabilityWeights(options);

      return {
        count,
        options,
        visible: Boolean(source.visible),
        spinning: Boolean(source.spinning),
        rotation: Number(source.rotation) || 0,
        spinStartedAt: Number(source.spinStartedAt) || 0,
        spinDuration: normalizeRouletteSpinDuration(source.spinDuration),
        resultIndex: clampNumber(source.resultIndex, -1, count - 1, -1)
      };
    }

    function getTotalWeight(roulette) {
      return roulette.options.reduce((sum, option) => sum + getOptionWeight(option), 0);
    }

    function normalizeReadableAngle(angle) {
      let next = ((((angle % 360) + 540) % 360) - 180);
      if (next > 90) next -= 180;
      if (next < -90) next += 180;
      return next;
    }

    function getRouletteLabelLayout(optionCount, visualCenter, spanDeg = 360 / Math.max(1, optionCount)) {
      if (optionCount <= 1) {
        return { radius: 0, width: 72, angle: 0 };
      }

      const baseWidth = optionCount <= 2 ? 44 : optionCount <= 3 ? 42 : optionCount > 6 ? 34 : 36;
      const width = Math.max(10, Math.min(baseWidth, spanDeg * 1.25));
      const radius = optionCount <= 2 ? 26 : optionCount <= 3 ? 28 : optionCount <= 6 ? 31 : optionCount <= 10 ? 32 : 34;
      const angle = optionCount <= 3 ? 0 : normalizeReadableAngle(visualCenter - 90);
      return { radius, width, angle };
    }

    function fitTextSize(text, maxWidth, baseSize, minSize) {
      let size = baseSize;
      while (size > minSize) {
        ctx.font = `900 ${size}px "Segoe UI", "Pretendard", "Noto Sans KR", Arial, sans-serif`;
        if (ctx.measureText(text).width <= maxWidth) break;
        size -= 0.5;
      }
      return size;
    }

    function drawLabel(text, x, y, angle, maxWidth, baseSize, minSize, strokeWidth) {
      const fontSize = fitTextSize(text, maxWidth, baseSize, minSize);
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle * Math.PI / 180);
      ctx.font = `900 ${fontSize}px "Segoe UI", "Pretendard", "Noto Sans KR", Arial, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineJoin = "round";
      ctx.miterLimit = 2;
      ctx.strokeStyle = "rgba(0, 0, 0, 0.86)";
      ctx.lineWidth = strokeWidth;
      ctx.fillStyle = "#ffffff";
      ctx.strokeText(text, 0, 0, maxWidth);
      ctx.fillText(text, 0, 0, maxWidth);
      ctx.restore();
    }

    function resizeCanvas(cssSize) {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const pixelSize = Math.max(1, Math.round(cssSize * dpr));
      if (wheel.width !== pixelSize || wheel.height !== pixelSize) {
        wheel.width = pixelSize;
        wheel.height = pixelSize;
      }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function drawRoulette(roulette) {
      const rect = wheel.getBoundingClientRect();
      const cssSize = Math.max(1, Math.round(rect.width || rect.height || 320));
      resizeCanvas(cssSize);

      const center = cssSize / 2;
      const radius = Math.max(1, (cssSize / 2) - Math.max(2, cssSize * 0.006));
      const total = getTotalWeight(roulette);
      const optionCount = roulette.options.length;
      let cursor = 0;

      ctx.clearRect(0, 0, cssSize, cssSize);

      roulette.options.forEach((option, index) => {
        const spanDeg = (getOptionWeight(option) / total) * 360;
        const start = (cursor - 180) * Math.PI / 180;
        const end = (cursor + spanDeg - 180) * Math.PI / 180;
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, start, end, false);
        ctx.closePath();
        ctx.fillStyle = rouletteColors[index % rouletteColors.length];
        ctx.fill();
        cursor += spanDeg;
      });

      ctx.beginPath();
      ctx.arc(center, center, radius, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(0, 0, 0, 0.78)";
      ctx.lineWidth = Math.max(2, cssSize * 0.009);
      ctx.stroke();

      cursor = 0;
      roulette.options.forEach((option, index) => {
        const spanDeg = (getOptionWeight(option) / total) * 360;
        const centerDeg = cursor + spanDeg / 2;
        const visualCenter = centerDeg - 90;
        const layout = getRouletteLabelLayout(optionCount, visualCenter, spanDeg);
        const radians = visualCenter * Math.PI / 180;
        const labelRadius = radius * (layout.radius / 50);
        const x = center + Math.sin(radians) * labelRadius;
        const y = center - Math.cos(radians) * labelRadius;
        const text = sanitizeRouletteLabel(option.label, `선택지 ${index + 1}`);
        const maxWidth = cssSize * (layout.width / 100);
        const spanScale = Math.max(0.55, Math.min(1, spanDeg / 24));
        const baseSize = cssSize * (optionCount > 12 ? 0.043 : optionCount > 9 ? 0.048 : optionCount > 6 ? 0.052 : 0.058) * spanScale;
        const minSize = Math.max(6, cssSize * 0.022);
        const strokeWidth = Math.max(3, cssSize * 0.012);
        drawLabel(text, x, y, layout.angle, maxWidth, baseSize, minSize, strokeWidth);
        cursor += spanDeg;
      });
    }

    function getRemainingDuration(roulette) {
      if (!roulette.spinning || !roulette.spinStartedAt) return 0;
      return Math.max(0, roulette.spinDuration - (Date.now() - roulette.spinStartedAt));
    }

    function normalizeDegrees(value) {
      return ((value % 360) + 360) % 360;
    }

    function getVisualSpinRevolutions(duration) {
      if (duration <= 2000) return 2;
      if (duration <= 3000) return 3;
      if (duration <= 5000) return 4;
      return 5;
    }

    function getVisualTargetRotation(fromRotation, targetRotation, duration) {
      const delta = (normalizeDegrees(targetRotation) - normalizeDegrees(fromRotation) + 360) % 360;
      return fromRotation + (getVisualSpinRevolutions(duration) * 360) + delta;
    }

    function easeSpin(progress) {
      const clamped = Math.min(1, Math.max(0, progress));
      return 1 - Math.pow(1 - clamped, 4);
    }

    function setWheelRotation(rotation) {
      displayRotation = rotation;
      wheel.style.transition = "none";
      wheel.style.transform = `rotate(${rotation}deg)`;
    }

    function setRouletteClasses(roulette, isAnimating) {
      const live = roulette.visible || roulette.spinning || isAnimating;
      document.body.classList.toggle("roulette-live", live);
      document.body.classList.toggle("has-result", live && !roulette.spinning && !isAnimating && roulette.resultIndex >= 0);

      const result = roulette.resultIndex >= 0 ? roulette.options[roulette.resultIndex]?.label : "";
      winner.textContent = live && !roulette.spinning && !isAnimating && result ? `🎉${result}🎉` : "";
    }

    function finishLocalSpin() {
      window.clearTimeout(localSpinTimer);
      window.cancelAnimationFrame(localSpinFrame);
      localSpinTimer = 0;
      localSpinFrame = 0;
      localSpinEndsAt = 0;

      if (!lastRoulette) return;
      lastRotation = displayRotation || lastRotation;
      setWheelRotation(lastRotation);
      setRouletteClasses(lastRoulette, false);
    }

    function startLocalSpin(roulette, duration) {
      window.clearTimeout(localSpinTimer);
      window.cancelAnimationFrame(localSpinFrame);
      localSpinEndsAt = Date.now() + duration;
      lastSpinStartedAt = roulette.spinStartedAt;

      setRouletteClasses(roulette, true);
      const startRotation = displayRotation || lastRotation;
      const targetRotation = getVisualTargetRotation(startRotation, roulette.rotation, roulette.spinDuration);
      const startedAt = performance.now();

      function animateFrame(now) {
        const progress = (now - startedAt) / duration;
        const eased = easeSpin(progress);
        const nextRotation = startRotation + ((targetRotation - startRotation) * eased);
        setWheelRotation(nextRotation);

        if (progress < 1 && localSpinEndsAt > Date.now()) {
          localSpinFrame = window.requestAnimationFrame(animateFrame);
          return;
        }

        lastRotation = targetRotation;
        setWheelRotation(targetRotation);
        localSpinFrame = 0;
      }

      setWheelRotation(startRotation);
      localSpinFrame = window.requestAnimationFrame(animateFrame);

      localSpinTimer = window.setTimeout(finishLocalSpin, duration + 80);
    }

    function applyRoulette(roulette) {
      lastRoulette = roulette;
      drawRoulette(roulette);

      const now = Date.now();
      const isLocalAnimating = localSpinEndsAt > now;
      const live = roulette.visible || roulette.spinning || isLocalAnimating;
      const hasNewSpin = roulette.spinStartedAt
        && roulette.spinStartedAt !== lastSpinStartedAt
        && roulette.visible
        && roulette.resultIndex >= 0
        && (roulette.spinning || hasAppliedState);

      if (!hasAppliedState && !roulette.spinning) {
        lastSpinStartedAt = roulette.spinStartedAt || lastSpinStartedAt;
        lastRotation = roulette.rotation;
        displayRotation = lastRotation;
        hasAppliedState = true;
        setRouletteClasses(roulette, false);
        setWheelRotation(lastRotation);
        return;
      }

      hasAppliedState = true;

      if (!live) {
        finishLocalSpin();
        lastRotation = roulette.rotation;
        setWheelRotation(lastRotation);
        return;
      }

      if (hasNewSpin) {
        const remaining = getRemainingDuration(roulette);
        startLocalSpin(roulette, Math.max(remaining + visualSpinSettleDelay, minimumVisibleSpinDuration));
        return;
      }

      if (isLocalAnimating) {
        setRouletteClasses(roulette, true);
        return;
      }

      finishLocalSpin();
      setRouletteClasses(roulette, false);
    }

    async function fetchState() {
      try {
        const response = await fetch(stateEndpoint, { cache: "no-store" });
        if (!response.ok) return;
        const payload = await response.text();
        if (payload === lastPayload) return;
        lastPayload = payload;
        const state = JSON.parse(payload);
        applyRoulette(normalizeRoulette(state.roulette));
      } catch {
        // The server may still be waking up.
      }
    }

    if ("ResizeObserver" in window) {
      new ResizeObserver(() => {
        if (lastRoulette) drawRoulette(lastRoulette);
      }).observe(wheel);
    } else {
      window.addEventListener("resize", () => {
        if (lastRoulette) drawRoulette(lastRoulette);
      });
    }

    fetchState();
    window.setInterval(fetchState, statePollInterval);
  </script>
</body>
</html>
