<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OBS Timer</title>
  <style>
    :root {
      --text-color: #ffffff;
      --outline-color: #000000;
      --panel-bg: rgba(18, 22, 29, 0.9);
      --panel-border: rgba(255, 255, 255, 0.16);
      --accent: #41d1ff;
      --timer-size: 180px;
      --timer-weight: 800;
      --timer-font-family: "Segoe UI", "Pretendard", "Noto Sans KR", Arial, sans-serif;
      --outline-width: 4px;
      --output-width: 320px;
      --output-height: 140px;
      --output-ratio: 320 / 140;
      --roulette-bg: conic-gradient(from -90deg, #84ef6d 0 50%, #ece86a 50% 100%);
      --roulette-rotation: 0deg;
      --roulette-spin-duration: 0ms;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: #fff;
      font-family: "Segoe UI", "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }

    body.solid-bg {
      background: rgba(17, 24, 39, var(--bg-opacity));
    }

    body.display-view {
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body.display-view.state-loading .timer {
      visibility: hidden;
    }

    body.control-view {
      min-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      background: #0d1320;
    }

    .stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      padding: 4vh 4vw;
    }

    body.display-view .stage {
      width: min(100vw, var(--output-width));
      height: min(100vh, var(--output-height));
      padding: 0;
    }

    body.control-view .stage {
      width: min(var(--output-width), calc(100% - 24px));
      height: auto;
      aspect-ratio: var(--output-ratio);
      margin: 12px auto 8px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    .timer-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      user-select: none;
    }

    .roulette-display {
      position: relative;
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .roulette-pointer {
      position: absolute;
      top: 4px;
      left: 50%;
      z-index: 2;
      color: #fff;
      font-size: clamp(18px, 7vmin, 34px);
      line-height: 1;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.65);
      transform: translateX(-50%);
    }

    .roulette-wheel {
      position: relative;
      width: min(82%, 82vh);
      max-width: calc(var(--output-width) * 0.82);
      max-height: calc(var(--output-height) * 0.82);
      aspect-ratio: 1;
      border: 2px solid rgba(0, 0, 0, 0.75);
      border-radius: 50%;
      background: var(--roulette-bg);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.32);
      overflow: hidden;
      transform: rotate(var(--roulette-rotation));
      transition: transform var(--roulette-spin-duration) cubic-bezier(0.12, 0.72, 0.08, 1);
    }

    .roulette-label {
      position: absolute;
      z-index: 1;
      width: 35%;
      overflow: hidden;
      color: #fff;
      font-size: clamp(10px, 2.5vw, 16px);
      font-weight: 900;
      line-height: 1.12;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      paint-order: stroke fill;
      pointer-events: none;
      text-align: center;
      text-overflow: ellipsis;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.75);
      transform: translate(-50%, -50%);
      -webkit-text-stroke: 3px rgba(0, 0, 0, 0.78);
    }

    .timer {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      color: var(--text-color);
      font-size: var(--timer-size);
      font-family: var(--timer-font-family);
      font-weight: var(--timer-weight);
      line-height: 0.94;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      padding: calc(var(--outline-width) + 2px);
      -webkit-text-fill-color: var(--text-color);
      -webkit-text-stroke: var(--outline-width) var(--outline-color);
      paint-order: stroke fill;
      text-shadow:
        0 0 calc(var(--outline-width) * 0.18) var(--outline-color),
        0 8px 20px rgba(0, 0, 0, 0.48);
      transform-origin: center;
    }

    .timer-part {
      display: inline-block;
      min-width: 0.56em;
      line-height: 0.94;
      text-align: center;
    }

    .timer-separator {
      position: relative;
      display: inline-block;
      align-self: center;
      flex: 0 0 0.34em;
      width: 0.34em;
      height: 1em;
      margin: 0 0.03em;
      transform: translateY(0);
    }

    .timer-separator::before,
    .timer-separator::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 0.095em;
      height: 0.095em;
      border-radius: 999px;
      background: var(--text-color);
      box-shadow:
        0 0 0 min(var(--outline-width), 0.095em) var(--outline-color),
        0 0 calc(var(--outline-width) * 0.12) var(--outline-color);
      transform: translate(-50%, -50%);
    }

    .timer-separator::before {
      top: 38%;
    }

    .timer-separator::after {
      top: 62%;
    }

    .timer.urgent {
      animation: pulse 0.85s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.035);
      }
    }

    .panel {
      display: none;
      width: min(780px, calc(100% - 24px));
      margin: 0 auto 12px;
      max-height: none;
      overflow: visible;
      padding: 10px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel-bg);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(12px);
    }

    body.control-view .panel {
      display: block;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    #timerPanelHeader {
      cursor: pointer;
      user-select: none;
    }

    .panel-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status-pill {
      flex: 0 0 auto;
      padding: 5px 8px;
      border: 1px solid rgba(65, 209, 255, 0.35);
      border-radius: 999px;
      background: rgba(65, 209, 255, 0.14);
      color: rgba(255, 255, 255, 0.88);
      font-size: 12px;
      font-weight: 700;
    }

    .panel-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .collapse-button {
      width: auto;
      min-height: 28px;
      padding: 4px 8px;
      border-color: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      color: rgba(255, 255, 255, 0.88);
      font-size: 12px;
      line-height: 1;
    }

    .timer-panel-body {
      display: block;
    }

    body.control-view.timer-collapsed .stage,
    body.control-view.timer-collapsed .timer-panel-body {
      display: none;
    }

    body.control-view.timer-collapsed .panel {
      margin-top: 12px;
    }

    body.control-view.timer-collapsed .panel-header {
      margin-bottom: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 6px;
    }

    .settings-row {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .field {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    label {
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 650;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      font: inherit;
    }

    input,
    select {
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      outline: none;
    }

    select {
      cursor: pointer;
    }

    select option {
      color: #111827;
    }

    input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="range"] {
      padding: 0;
      cursor: pointer;
    }

    button {
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      transition: background 80ms ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    button.primary {
      border-color: rgba(65, 209, 255, 0.58);
      background: rgba(65, 209, 255, 0.24);
    }

    button.danger {
      border-color: rgba(255, 99, 99, 0.5);
      background: rgba(255, 99, 99, 0.18);
    }

    .time-stepper {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      gap: 5px;
    }

    .time-stepper input {
      height: 52px;
      min-height: 52px;
      padding: 6px 8px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .stepper-buttons {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 4px;
    }

    .step-button {
      min-height: 0;
      height: 24px;
      padding: 0;
      border-color: rgba(65, 209, 255, 0.28);
      background: rgba(65, 209, 255, 0.12);
      font-size: 13px;
      line-height: 1;
      touch-action: none;
      user-select: none;
    }

    .step-button:hover {
      background: rgba(65, 209, 255, 0.22);
    }

    .segment {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    .mode-button.active {
      border-color: rgba(65, 209, 255, 0.72);
      background: rgba(65, 209, 255, 0.32);
      color: #fff;
    }

    .paint-palette {
      display: grid;
      gap: 6px;
      margin-top: 6px;
    }

    .paint-targets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .color-target {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      align-items: center;
      gap: 6px;
      min-height: 36px;
      text-align: left;
    }

    .color-target.active {
      border-color: rgba(65, 209, 255, 0.72);
      background: rgba(65, 209, 255, 0.24);
    }

    .color-preview {
      width: 23px;
      height: 23px;
      border: 2px solid rgba(255, 255, 255, 0.85);
      border-radius: 4px;
      background: var(--preview-color);
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.26);
    }

    .color-picker {
      display: grid;
      gap: 7px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
    }

    .color-square {
      position: relative;
      width: 100%;
      height: 128px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      background:
        linear-gradient(to top, #000, rgba(0, 0, 0, 0)),
        linear-gradient(to right, #fff, hsl(var(--picker-hue), 100%, 50%));
      cursor: crosshair;
      touch-action: none;
    }

    .color-point {
      position: absolute;
      left: calc(var(--picker-sat) * 1%);
      top: calc((100 - var(--picker-val)) * 1%);
      width: 14px;
      height: 14px;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.36);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hue-slider {
      min-height: 14px;
      padding: 0;
      appearance: none;
      background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
      border: 0;
      border-radius: 999px;
    }

    .hue-slider::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 3px solid #fff;
      border-radius: 50%;
      background: transparent;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.36);
    }

    .hue-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: 3px solid #fff;
      border-radius: 50%;
      background: transparent;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.36);
    }

    .active-color-row {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) 66px;
      gap: 6px;
      align-items: center;
    }

    .share-box {
      display: grid;
      gap: 5px;
      margin-top: 8px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
    }

    .share-box input {
      min-height: 34px;
      font-size: 12px;
    }

    .hint {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      line-height: 1.45;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    .toggle-row input {
      width: 18px;
      min-height: 18px;
    }

    .toggle-row label {
      flex: 1;
      font-size: 13px;
    }

    .opacity-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 44px;
      gap: 6px;
      align-items: center;
      margin-top: 6px;
    }

    .opacity-value {
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      font-weight: 700;
      text-align: right;
    }

    .font-panel {
      display: grid;
      gap: 6px;
      margin-top: 6px;
    }

    .size-panel {
      display: grid;
      gap: 5px;
      margin-top: 6px;
    }

    .size-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 18px minmax(0, 1fr);
      gap: 6px;
      align-items: center;
      max-width: 240px;
    }

    .size-row span {
      color: rgba(255, 255, 255, 0.66);
      font-weight: 800;
      text-align: center;
    }

    .font-select {
      max-width: 240px;
      min-height: 32px;
      padding-right: 28px;
    }

    .font-empty {
      padding: 9px 10px;
      border: 1px dashed rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 12px;
    }

    .roulette-panel {
      margin-top: 12px;
    }

    .roulette-body {
      display: grid;
      gap: 10px;
    }

    .roulette-step-title {
      margin: 6px 0 2px;
      color: rgba(255, 255, 255, 0.95);
      font-size: 18px;
      font-weight: 700;
      text-align: center;
    }

    .roulette-count-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .roulette-count-control button {
      width: 38px;
      min-height: 36px;
      background: rgba(0, 132, 255, 0.92);
      font-size: 16px;
    }

    .roulette-count-value {
      min-width: 38px;
      padding: 9px 8px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-weight: 800;
      text-align: center;
    }

    .roulette-subhint {
      margin: 0;
      color: rgba(255, 255, 255, 0.74);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    .roulette-preview {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 250px;
      padding: 18px 0;
    }

    .roulette-preview .roulette-pointer {
      top: 4px;
    }

    .roulette-preview .roulette-wheel {
      width: min(280px, 72vw);
      max-width: none;
      max-height: none;
    }

    .roulette-preview .roulette-label {
      font-size: clamp(10px, 2vw, 14px);
      -webkit-text-stroke-width: 2px;
    }

    .roulette-primary {
      width: auto;
      min-width: 150px;
      justify-self: center;
      padding: 12px 18px;
      border-color: rgba(0, 132, 255, 0.95);
      background: rgba(0, 132, 255, 0.95);
      font-size: 18px;
    }

    .roulette-secondary {
      width: auto;
      justify-self: center;
      min-width: 120px;
    }

    .roulette-options {
      display: grid;
      gap: 8px;
    }

    .roulette-option-row {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .roulette-option-row label {
      text-align: center;
    }

    .roulette-spin-layout {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .roulette-result {
      min-height: 24px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 16px;
      font-weight: 800;
      text-align: center;
    }

    .probability-panel {
      width: 100%;
      max-width: 560px;
      justify-self: center;
    }

    .probability-panel summary {
      cursor: pointer;
      color: rgba(255, 255, 255, 0.84);
      font-size: 13px;
      font-weight: 800;
    }

    .probability-list {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }

    .probability-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 82px;
      gap: 8px;
      align-items: center;
    }

    .probability-row span {
      overflow: hidden;
      color: rgba(255, 255, 255, 0.84);
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .roulette-history {
      display: grid;
      gap: 5px;
      width: 100%;
      max-width: 560px;
      justify-self: center;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
    }

    .roulette-history-title {
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 800;
    }

    .roulette-history-list {
      display: grid;
      gap: 4px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .roulette-history-list li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
    }

    .nudge-grid {
      margin-top: 6px;
    }

    .nudge-button {
      transition: none;
      touch-action: manipulation;
      user-select: none;
      will-change: auto;
    }

    .nudge-button:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    @media (max-width: 560px) {
      body.control-view .stage {
        width: calc(100% - 20px);
      }

      .panel {
        width: calc(100% - 20px);
        padding: 12px;
      }

      .grid,
      .row {
        grid-template-columns: 1fr;
      }

      .active-color-row {
        grid-template-columns: 34px minmax(0, 1fr);
      }

      .active-color-row button {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-live="polite">
    <div class="timer-wrap">
      <div id="timer" class="timer">00:00</div>
    </div>
  </main>

  <section class="panel" aria-label="타이머 조작 패널">
    <div id="timerPanelHeader" class="panel-header" role="button" tabindex="0" aria-expanded="true" aria-controls="timerPanelBody">
      <h1 class="panel-title">OBS 타이머</h1>
      <div class="panel-actions">
        <div class="status-pill">컨트롤러</div>
        <button id="timerCollapseButton" class="collapse-button" type="button">접기</button>
      </div>
    </div>

    <div id="timerPanelBody" class="timer-panel-body">
    <div class="grid">
      <div class="field">
        <label for="hours">시</label>
        <div class="time-stepper">
          <input id="hours" type="number" min="0" max="99" step="1" value="0" inputmode="numeric">
          <div class="stepper-buttons" aria-label="시 조절">
            <button class="step-button" data-time-step="hours" data-step="1" type="button" aria-label="시 올리기">▲</button>
            <button class="step-button" data-time-step="hours" data-step="-1" type="button" aria-label="시 내리기">▼</button>
          </div>
        </div>
      </div>
      <div class="field">
        <label for="minutes">분</label>
        <div class="time-stepper">
          <input id="minutes" type="number" min="0" max="59" step="1" value="0" inputmode="numeric">
          <div class="stepper-buttons" aria-label="분 조절">
            <button class="step-button" data-time-step="minutes" data-step="1" type="button" aria-label="분 올리기">▲</button>
            <button class="step-button" data-time-step="minutes" data-step="-1" type="button" aria-label="분 내리기">▼</button>
          </div>
        </div>
      </div>

  <section class="panel roulette-panel" aria-label="룰렛 조작 패널">

    <div id="rouletteBody" class="roulette-body">
      <div id="rouletteStepCount">
        <p class="roulette-step-title">1. 룰렛(원판) 선택지 개수를 정해주세요.</p>

          <div class="roulette-wheel" id="rouletteCountWheel"></div>

      <div id="rouletteStepOptions" hidden>
        <p class="roulette-step-title">2. 룰렛(원판) 선택지를 입력해주세요.</p>

        <p class="roulette-step-title">3. 룰렛(원판)을 돌려주세요.</p>
        <div class="roulette-spin-layout">
          <div class="roulette-preview">
            <div class="roulette-pointer">▼</div>
            <div class="roulette-wheel" id="rouletteControlWheel"></div>
          </div>

          <button id="rouletteSpinButton" class="roulette-primary" type="button">원판 돌리기</button>
          <button id="rouletteHideBroadcast" class="roulette-secondary" type="button">방송에서 숨기기</button>
          <button id="rouletteResetSetup" class="roulette-secondary" type="button">처음부터 설정</button>

            <summary>확률 조정</summary>
            <div id="rouletteProbabilityList" class="probability-list"></div>
          </details>

            <div class="roulette-history-title">기록지 (방송에는 표시되지 않음)</div>

  <script>
    const params = new URLSearchParams(location.search);
    const pathView = location.pathname.toLowerCase();
    const isServerMode = location.protocol === "http:" || location.protocol === "https:";
    const isControlView = params.has("control") || params.get("view") === "control" || pathView === "/" || pathView.endsWith("/control") || pathView.endsWith("/controller") || location.hash.includes("control");
    const room = getRoomName();
    const controlKey = getControlKey();
    const stateEndpoint = `/state?room=${encodeURIComponent(room)}`;
    const writeStateEndpoint = `${stateEndpoint}&key=${encodeURIComponent(controlKey)}`;
    const fontsEndpoint = "/fonts";
    const storageKey = "obsTimerState.v2";
    const legacyStorageKey = "obsTimerState";
    const timerPanelCollapseStorageKey = "obsTimerPanelCollapsed";
    const channelName = "obs-timer-control";
    const channel = !isServerMode && "BroadcastChannel" in window ? new BroadcastChannel(channelName) : null;
    const rouletteColors = [
      "#86ef6f", "#ece86a", "#56c7ff", "#ff8a3d", "#c084fc",
      "#f472b6", "#34d399", "#facc15", "#60a5fa", "#fb7185",
      "#a3e635", "#f97316", "#22d3ee", "#e879f9", "#fef08a"
    ];

    const defaults = {
      duration: 0,
      remaining: 0,
      elapsed: 0,
      running: false,
      lastStartedAt: 0,
      mode: "down",
      textColor: "#ffffff",
      outlineColor: "#000000",
      outlineWidth: 4,
      fontSize: 180,
      fontFile: "",
      showHours: false,
      solidBg: false,
      bgOpacity: 100,
      outputWidth: 320,
      outputHeight: 140,
      roulette: createDefaultRoulette()
    };

    document.body.classList.add(isControlView ? "control-view" : "display-view");
    if (isServerMode) {
      document.body.classList.add("state-loading");
    }

    const state = loadState();
    let lastFrameAt = performance.now();
    let lastRenderedSecond = null;
    let lastTimerText = "";
    let lastServerPayload = "";
    let draftTimeDirty = false;
    let activeColorTarget = "textColor";
    let availableFonts = [];
    let pickerHsv = { h: 0, s: 0, v: 1 };
    let serverSaveTimer = 0;
    let serverPostInFlight = false;
    let needsServerPost = false;
    let lastServerPostAt = 0;
    let lastLocalChangeAt = 0;
    let timerPanelCollapsed = false;
    let rafId = 0;

    const els = {
      stage: document.querySelector(".stage"),
      timer: document.getElementById("timer"),
      timerPanelHeader: document.getElementById("timerPanelHeader"),
      timerPanelBody: document.getElementById("timerPanelBody"),
      timerCollapseButton: document.getElementById("timerCollapseButton"),
      rouletteCountWheel: document.getElementById("rouletteCountWheel"),
      rouletteControlWheel: document.getElementById("rouletteControlWheel"),
      rouletteStepCount: document.getElementById("rouletteStepCount"),
      rouletteStepOptions: document.getElementById("rouletteStepOptions"),
      rouletteStepSpin: document.getElementById("rouletteStepSpin"),
      rouletteCountPlus: document.getElementById("rouletteCountPlus"),
      rouletteCountMinus: document.getElementById("rouletteCountMinus"),
      rouletteCountValue: document.getElementById("rouletteCountValue"),
      rouletteConfirmCount: document.getElementById("rouletteConfirmCount"),
      rouletteOptionInputs: document.getElementById("rouletteOptionInputs"),
      rouletteConfirmOptions: document.getElementById("rouletteConfirmOptions"),
      rouletteResult: document.getElementById("rouletteResult"),
      rouletteSpinButton: document.getElementById("rouletteSpinButton"),
      rouletteHideBroadcast: document.getElementById("rouletteHideBroadcast"),
      rouletteResetSetup: document.getElementById("rouletteResetSetup"),
      rouletteProbabilityList: document.getElementById("rouletteProbabilityList"),
      rouletteHistoryList: document.getElementById("rouletteHistoryList"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds"),
      timeInputs: document.querySelectorAll("#hours, #minutes, #seconds"),
      timeStepButtons: document.querySelectorAll("[data-time-step]"),
      applyTime: document.getElementById("applyTime"),
      resetTime: document.getElementById("resetTime"),
      toggleRun: document.getElementById("toggleRun"),
      stopTimer: document.getElementById("stopTimer"),
      modeButtons: document.querySelectorAll("[data-mode]"),
      fontSize: document.getElementById("fontSize"),
      outlineWidth: document.getElementById("outlineWidth"),
      outlineWidthValue: document.getElementById("outlineWidthValue"),
      fontSelect: document.getElementById("fontSelect"),
      fontEmpty: document.getElementById("fontEmpty"),
      colorTargetButtons: document.querySelectorAll("[data-color-target-button]"),
      textColorPreview: document.getElementById("textColorPreview"),
      outlineColorPreview: document.getElementById("outlineColorPreview"),
      activeColorPreview: document.getElementById("activeColorPreview"),
      activeColorHex: document.getElementById("activeColorHex"),
      applyActiveColor: document.getElementById("applyActiveColor"),
      colorSquare: document.getElementById("colorSquare"),
      hueSlider: document.getElementById("hueSlider"),
      showHours: document.getElementById("showHours"),
      solidBg: document.getElementById("solidBg"),
      bgOpacity: document.getElementById("bgOpacity"),
      bgOpacityValue: document.getElementById("bgOpacityValue"),
      outputWidth: document.getElementById("outputWidth"),
      outputHeight: document.getElementById("outputHeight"),
      displayUrl: document.getElementById("displayUrl"),
      rouletteUrl: document.getElementById("rouletteUrl"),
      controlUrl: document.getElementById("controlUrl")
    };

    function sanitizeRoom(value) {
      return String(value || "")
        .trim()
        .replace(/[^a-zA-Z0-9_-]/g, "")
        .slice(0, 40);
    }

    function makeRoomId() {
      const random = Math.random().toString(36).slice(2, 8);
      return `room-${random}`;
    }

    function makeControlKey() {
      const first = Math.random().toString(36).slice(2);
      const second = Math.random().toString(36).slice(2);
      return `${first}${second}`.slice(0, 24);
    }

    function sanitizeKey(value) {
      return String(value || "")
        .trim()
        .replace(/[^a-zA-Z0-9_-]/g, "")
        .slice(0, 64);
    }

    function getRoomName() {
      const explicit = sanitizeRoom(params.get("room") || params.get("r"));
      if (explicit) return explicit;

      if (isServerMode && isControlView) {
        const saved = sanitizeRoom(localStorage.getItem("obsTimerRoom"));
        const next = saved || makeRoomId();
        localStorage.setItem("obsTimerRoom", next);
        params.set("room", next);
        history.replaceState(null, "", `${location.pathname}?${params.toString()}${location.hash}`);
        return next;
      }

      return "default";
    }

    function getControlKey() {
      if (!isServerMode || !isControlView) return "";

      const explicit = sanitizeKey(params.get("key"));
      if (explicit) return explicit;

      const storageKeyForRoom = `obsTimerControlKey:${room}`;
      const saved = sanitizeKey(localStorage.getItem(storageKeyForRoom));
      const next = saved || makeControlKey();
      localStorage.setItem(storageKeyForRoom, next);
      params.set("key", next);
      history.replaceState(null, "", `${location.pathname}?${params.toString()}${location.hash}`);
      return next;
    }

    function loadState() {
      if (isServerMode) {
        return normalizeState({});
      }
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || localStorage.getItem(legacyStorageKey) || "{}");
        return normalizeState(saved);
      } catch {
        return normalizeState({});
      }
    }

    function normalizeState(value) {
      const next = { ...defaults, ...value };
      next.duration = clampNumber(next.duration, 0, 359999, defaults.duration);
      next.remaining = clampNumber(next.remaining, 0, 359999, defaults.remaining);
      next.elapsed = clampNumber(next.elapsed, 0, 359999, defaults.elapsed);
      next.running = Boolean(next.running);
      next.lastStartedAt = Number(next.lastStartedAt) || 0;
      next.mode = next.mode === "up" ? "up" : "down";
      next.textColor = normalizeHex(next.textColor, defaults.textColor);
      next.outlineColor = normalizeHex(next.outlineColor, defaults.outlineColor);
      next.outlineWidth = clampNumber(next.outlineWidth, 0, 40, defaults.outlineWidth);
      next.fontSize = clampNumber(next.fontSize, 72, 260, defaults.fontSize);
      next.fontFile = sanitizeFontFile(next.fontFile);
      next.showHours = Boolean(next.showHours);
      next.solidBg = Boolean(next.solidBg);
      next.bgOpacity = clampNumber(next.bgOpacity, 0, 100, defaults.bgOpacity);
      next.outputWidth = clampNumber(next.outputWidth, 120, 1920, defaults.outputWidth);
      next.outputHeight = clampNumber(next.outputHeight, 60, 1080, defaults.outputHeight);
      next.roulette = normalizeRoulette(next.roulette);
      return next;
    }

    function createDefaultRoulette() {
      return {
        step: "count",
        count: 2,
        options: [
          { label: "선택지 1", weight: 1 },
          { label: "선택지 2", weight: 1 }
        ],
        visible: false,
        spinning: false,
        rotation: 0,
        spinStartedAt: 0,
        spinDuration: 5200,
        resultIndex: -1,
        history: []
      };
    }

    function sanitizeRouletteLabel(value, fallback) {
      const label = String(value || "").trim().slice(0, 40);
      return label || fallback;
    }

    function normalizeRoulette(value) {
      const defaultsRoulette = createDefaultRoulette();
      const source = value && typeof value === "object" ? value : {};
      const count = clampInt(source.count, 1, 15);
      const rawOptions = Array.isArray(source.options) ? source.options : [];
      const options = [];

      for (let index = 0; index < count; index += 1) {
        const option = rawOptions[index] && typeof rawOptions[index] === "object" ? rawOptions[index] : {};
        options.push({
          label: sanitizeRouletteLabel(option.label, `선택지 ${index + 1}`),
          weight: clampNumber(option.weight, 1, 999, 1)
        });
      }

      const step = ["count", "options", "spin"].includes(source.step) ? source.step : defaultsRoulette.step;
      const history = Array.isArray(source.history) ? source.history.slice(0, 30).map((item) => ({
        label: sanitizeRouletteLabel(item?.label, "결과"),
        at: Number(item?.at) || Date.now()
      })) : [];

      return {
        ...defaultsRoulette,
        ...source,
        step,
        count,
        options,
        visible: Boolean(source.visible),
        spinning: Boolean(source.spinning),
        rotation: Number(source.rotation) || 0,
        spinStartedAt: Number(source.spinStartedAt) || 0,
        spinDuration: clampNumber(source.spinDuration, 1800, 12000, defaultsRoulette.spinDuration),
        resultIndex: clampInt(source.resultIndex, -1, count - 1),
        history
      };
    }

    function sanitizeFontFile(value) {
      return String(value || "")
        .trim()
        .replace(/\\/g, "/")
        .split("/")
        .pop()
        .replace(/[<>:"|?*\u0000-\u001F]/g, "")
        .slice(0, 160);
    }

    function getFontLabel(fileName) {
      return sanitizeFontFile(fileName)
        .replace(/\.(woff2?|ttf|otf)$/i, "")
        .replace(/[_-]+/g, " ")
        .trim() || "기본";
    }

    function getTimerFontFamily() {
      if (!state.fontFile) {
        return `"Segoe UI", "Pretendard", "Noto Sans KR", Arial, sans-serif`;
      }
      return `"OBS_TIMER_CUSTOM", "Segoe UI", "Pretendard", "Noto Sans KR", Arial, sans-serif`;
    }

    function applyTimerFont() {
      let style = document.getElementById("dynamicFontFace");
      if (!style) {
        style = document.createElement("style");
        style.id = "dynamicFontFace";
        document.head.appendChild(style);
      }

      if (!state.fontFile || !isServerMode) {
        style.textContent = "";
        document.documentElement.style.setProperty("--timer-font-family", getTimerFontFamily());
        return;
      }

      const fontUrl = `/fonts/${encodeURIComponent(state.fontFile)}`;
      style.textContent = `
        @font-face {
          font-family: "OBS_TIMER_CUSTOM";
          src: url("${fontUrl}");
          font-display: swap;
        }
      `;
      document.documentElement.style.setProperty("--timer-font-family", getTimerFontFamily());
    }

    async function loadFonts() {
      if (!isServerMode) {
        availableFonts = [];
        renderFontList();
        return;
      }

      try {
        const response = await fetch(fontsEndpoint, { cache: "no-store" });
        if (!response.ok) throw new Error("Font list unavailable");
        availableFonts = await response.json();
      } catch {
        availableFonts = [];
      }
      renderFontList();
    }

    function renderFontList() {
      if (!isControlView) return;

      const options = [
        `<option value="">기본값 ...</option>`,
        ...availableFonts.map((font) => (
          `<option value="${font.file}">${font.label}</option>`
        ))
      ];
      els.fontSelect.innerHTML = options.join("");
      els.fontSelect.value = state.fontFile;
      els.fontEmpty.style.display = availableFonts.length ? "none" : "block";
    }

    function updateFontButtons() {
      if (!isControlView) return;
      els.fontSelect.value = state.fontFile;
    }

    function readTimerPanelCollapsed() {
      if (!isControlView) return false;
      try {
        return localStorage.getItem(timerPanelCollapseStorageKey) === "1";
      } catch {
        return false;
      }
    }

    function setTimerPanelCollapsed(collapsed, persist = true) {
      if (!isControlView) return;
      timerPanelCollapsed = Boolean(collapsed);
      document.body.classList.toggle("timer-collapsed", timerPanelCollapsed);
      els.timerPanelHeader.setAttribute("aria-expanded", String(!timerPanelCollapsed));
      els.timerCollapseButton.textContent = timerPanelCollapsed ? "펼치기" : "접기";
      if (persist) {
        try {
          localStorage.setItem(timerPanelCollapseStorageKey, timerPanelCollapsed ? "1" : "0");
        } catch {
          // Ignore storage failures in private browsing modes.
        }
      }
      if (!timerPanelCollapsed) {
        window.requestAnimationFrame(fitTimer);
      }
    }

    function toggleTimerPanelCollapsed() {
      setTimerPanelCollapsed(!timerPanelCollapsed);
    }

    function saveState(emit = true) {
      if (isServerMode) {
        if (emit && isControlView) scheduleServerSave();
        return;
      }
      const payload = JSON.stringify(state);
      localStorage.setItem(storageKey, payload);
      if (emit && channel) {
        channel.postMessage({ type: "state", state });
      }
    }

    function scheduleServerSave(delay = 120) {
      lastLocalChangeAt = Date.now();
      const elapsed = Date.now() - lastServerPostAt;
      if (!serverPostInFlight && elapsed >= delay) {
        postServerState();
        return;
      }

      window.clearTimeout(serverSaveTimer);
      serverSaveTimer = window.setTimeout(postServerState, Math.max(20, delay - elapsed));
    }

    async function fetchServerState() {
      if (!isServerMode) return;
      try {
        const response = await fetch(stateEndpoint, { cache: "no-store" });
        if (!response.ok) return;
        const payload = await response.text();
        if (payload === lastServerPayload) return;
        lastServerPayload = payload;
        receiveState(JSON.parse(payload));
      } catch {
        // The local timer server may still be starting.
      }
    }

    async function postServerState() {
      if (serverPostInFlight) {
        needsServerPost = true;
        return;
      }

      try {
        window.clearTimeout(serverSaveTimer);
        serverSaveTimer = 0;
        serverPostInFlight = true;
        lastServerPostAt = Date.now();
        const payload = JSON.stringify(state);
        lastServerPayload = payload;
        await fetch(writeStateEndpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: payload
        });
      } catch {
        // Keep the controller responsive even if the local server is temporarily unavailable.
      } finally {
        serverPostInFlight = false;
        if (needsServerPost) {
          needsServerPost = false;
          scheduleServerSave(90);
        }
      }
    }

    function receiveState(nextState) {
      if (isControlView && Date.now() - lastLocalChangeAt < 500) {
        return;
      }
      Object.assign(state, normalizeState(nextState));
      document.body.classList.remove("state-loading");
      render(true);
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, number));
    }

    function clampInt(value, min, max) {
      const number = Number.parseInt(value, 10);
      if (Number.isNaN(number)) return min;
      return Math.min(max, Math.max(min, number));
    }

    function normalizeHex(value, fallback) {
      const raw = String(value || "").trim();
      const withHash = raw.startsWith("#") ? raw : `#${raw}`;
      if (/^#[0-9a-fA-F]{3}$/.test(withHash)) {
        return `#${withHash[1]}${withHash[1]}${withHash[2]}${withHash[2]}${withHash[3]}${withHash[3]}`.toLowerCase();
      }
      if (/^#[0-9a-fA-F]{6}$/.test(withHash)) {
        return withHash.toLowerCase();
      }
      return fallback;
    }

    function hexToRgb(hex) {
      const normalized = normalizeHex(hex, "#ffffff");
      return {
        r: Number.parseInt(normalized.slice(1, 3), 16),
        g: Number.parseInt(normalized.slice(3, 5), 16),
        b: Number.parseInt(normalized.slice(5, 7), 16)
      };
    }

    function rgbToHex({ r, g, b }) {
      const toHex = (value) => Math.round(value).toString(16).padStart(2, "0");
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function rgbToHsv({ r, g, b }) {
      const nr = r / 255;
      const ng = g / 255;
      const nb = b / 255;
      const max = Math.max(nr, ng, nb);
      const min = Math.min(nr, ng, nb);
      const delta = max - min;
      let h = 0;

      if (delta !== 0) {
        if (max === nr) h = 60 * (((ng - nb) / delta) % 6);
        if (max === ng) h = 60 * ((nb - nr) / delta + 2);
        if (max === nb) h = 60 * ((nr - ng) / delta + 4);
      }

      return {
        h: Math.round((h + 360) % 360),
        s: max === 0 ? 0 : delta / max,
        v: max
      };
    }

    function hsvToRgb({ h, s, v }) {
      const c = v * s;
      const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
      const m = v - c;
      let r = 0;
      let g = 0;
      let b = 0;

      if (h < 60) [r, g, b] = [c, x, 0];
      else if (h < 120) [r, g, b] = [x, c, 0];
      else if (h < 180) [r, g, b] = [0, c, x];
      else if (h < 240) [r, g, b] = [0, x, c];
      else if (h < 300) [r, g, b] = [x, 0, c];
      else [r, g, b] = [c, 0, x];

      return {
        r: (r + m) * 255,
        g: (g + m) * 255,
        b: (b + m) * 255
      };
    }

    function setPickerFromHex(hex) {
      pickerHsv = rgbToHsv(hexToRgb(hex));
      updateColorPicker();
    }

    function updateColorPicker() {
      const activeHex = state[activeColorTarget];
      els.colorSquare.style.setProperty("--picker-hue", pickerHsv.h);
      els.colorSquare.style.setProperty("--picker-sat", Math.round(pickerHsv.s * 100));
      els.colorSquare.style.setProperty("--picker-val", Math.round(pickerHsv.v * 100));
      els.hueSlider.value = pickerHsv.h;
      els.activeColorHex.value = activeHex;
      els.activeColorPreview.style.setProperty("--preview-color", activeHex);
    }

    function setColorFromPicker() {
      setColor(activeColorTarget, rgbToHex(hsvToRgb(pickerHsv)));
    }

    function pickColorFromSquare(event) {
      const rect = els.colorSquare.getBoundingClientRect();
      const x = Math.min(rect.width, Math.max(0, event.clientX - rect.left));
      const y = Math.min(rect.height, Math.max(0, event.clientY - rect.top));
      pickerHsv.s = rect.width ? x / rect.width : 0;
      pickerHsv.v = rect.height ? 1 - y / rect.height : 1;
      setColorFromPicker();
    }

    function readInputSeconds() {
      const hours = clampInt(els.hours.value, 0, 99);
      const minutes = clampInt(els.minutes.value, 0, 59);
      const seconds = clampInt(els.seconds.value, 0, 59);
      els.hours.value = hours;
      els.minutes.value = minutes;
      els.seconds.value = seconds;
      return hours * 3600 + minutes * 60 + seconds;
    }

    function writeInputSeconds(total) {
      if (!isControlView || isTimeInputFocused() || draftTimeDirty) return;
      const safeTotal = Math.max(0, Math.floor(total));
      els.hours.value = Math.floor(safeTotal / 3600);
      els.minutes.value = Math.floor((safeTotal % 3600) / 60);
      els.seconds.value = safeTotal % 60;
    }

    function isTimeInputFocused() {
      return document.activeElement === els.hours || document.activeElement === els.minutes || document.activeElement === els.seconds;
    }

    function getTimeInputMeta(inputId) {
      if (inputId === "hours") return { input: els.hours, min: 0, max: 99 };
      if (inputId === "minutes") return { input: els.minutes, min: 0, max: 59 };
      return { input: els.seconds, min: 0, max: 59 };
    }

    function setTimeInputValue(input, value, min, max) {
      input.value = clampInt(value, min, max);
      draftTimeDirty = true;
    }

    function stepTimeInput(inputId, amount) {
      const { input, min, max } = getTimeInputMeta(inputId);
      const current = clampInt(input.value, min, max);
      setTimeInputValue(input, current + amount, min, max);
    }

    function getCurrentTimes(now = Date.now()) {
      const delta = state.running && state.lastStartedAt ? Math.max(0, (now - state.lastStartedAt) / 1000) : 0;
      return {
        remaining: state.mode === "down" ? Math.max(0, state.remaining - delta) : state.remaining,
        elapsed: state.mode === "up" ? state.elapsed + delta : state.elapsed
      };
    }

    function freezeTime(now = Date.now()) {
      const current = getCurrentTimes(now);
      state.remaining = current.remaining;
      state.elapsed = current.elapsed;
      state.lastStartedAt = now;
      if (state.mode === "down" && state.remaining <= 0) {
        state.running = false;
      }
    }

    function activeSeconds() {
      const current = getCurrentTimes();
      return state.mode === "up" ? current.elapsed : current.remaining;
    }

    function formatTime(totalSeconds) {
      const total = Math.max(0, Math.floor(totalSeconds));
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const seconds = total % 60;

      if (hours > 0 || state.showHours) {
        return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function renderTimerText(value) {
      if (value === lastTimerText) return;
      lastTimerText = value;
      els.timer.setAttribute("aria-label", value);

      const fragment = document.createDocumentFragment();
      for (const char of value) {
        const span = document.createElement("span");
        if (char === ":") {
          span.className = "timer-separator";
          span.setAttribute("aria-hidden", "true");
        } else {
          span.className = "timer-part";
          span.textContent = char;
        }
        fragment.appendChild(span);
      }
      els.timer.replaceChildren(fragment);
    }

    function getRouletteTotalWeight() {
      return state.roulette.options.reduce((sum, option) => sum + Math.max(1, Number(option.weight) || 1), 0);
    }

    function getRouletteBackground() {
      const total = getRouletteTotalWeight();
      let cursor = 0;
      const stops = state.roulette.options.map((option, index) => {
        const start = cursor;
        cursor += (Math.max(1, Number(option.weight) || 1) / total) * 100;
        return `${rouletteColors[index % rouletteColors.length]} ${start.toFixed(4)}% ${cursor.toFixed(4)}%`;
      });
      return `conic-gradient(from -90deg, ${stops.join(", ")})`;
    }

    function getRouletteSegmentCenter(index) {
      const total = getRouletteTotalWeight();
      let cursor = 0;
      for (let i = 0; i < state.roulette.options.length; i += 1) {
        const span = (Math.max(1, Number(state.roulette.options[i].weight) || 1) / total) * 360;
        if (i === index) return cursor + span / 2;
        cursor += span;
      }
      return 0;
    }

    function applyRouletteWheelStyle(wheel, duration = 0) {
      if (!wheel) return;
      wheel.style.background = getRouletteBackground();
      wheel.style.setProperty("--roulette-rotation", `${state.roulette.rotation}deg`);
      wheel.style.setProperty("--roulette-spin-duration", `${duration}ms`);
      renderRouletteLabels(wheel);
    }

    function renderRouletteLabels(wheel) {
      if (!wheel) return;
      const total = getRouletteTotalWeight();
      const labelRadius = state.roulette.options.length > 10 ? 28 : state.roulette.options.length > 6 ? 30 : 31;
      let cursor = 0;
      const fragment = document.createDocumentFragment();

      state.roulette.options.forEach((option, index) => {
        const span = (Math.max(1, Number(option.weight) || 1) / total) * 360;
        const center = cursor + span / 2;
        const radians = center * Math.PI / 180;
        const label = document.createElement("span");
        label.className = "roulette-label";
        label.textContent = option.label;
        label.style.left = `${50 + Math.sin(radians) * labelRadius}%`;
        label.style.top = `${50 - Math.cos(radians) * labelRadius}%`;
        label.style.color = rouletteColors[index % rouletteColors.length] === "#fef08a" ? "#111827" : "#ffffff";
        fragment.appendChild(label);
        cursor += span;
      });

      wheel.replaceChildren(fragment);
    }

    function renderRouletteOptionInputs() {
      if (!isControlView) return;
      if (els.rouletteOptionInputs.contains(document.activeElement)) return;
      const fragment = document.createDocumentFragment();
      state.roulette.options.forEach((option, index) => {
        const row = document.createElement("div");
        row.className = "roulette-option-row";

        const label = document.createElement("label");
        label.textContent = `[${index + 1}]`;
        label.htmlFor = `rouletteOption${index}`;

        const input = document.createElement("input");
        input.id = `rouletteOption${index}`;
        input.type = "text";
        input.value = option.label;
        input.maxLength = 40;
        input.dataset.rouletteOptionIndex = String(index);

        row.append(label, input);
        fragment.appendChild(row);
      });
      els.rouletteOptionInputs.replaceChildren(fragment);
    }

    function renderRouletteProbabilityInputs() {
      if (!isControlView) return;
      if (els.rouletteProbabilityList.contains(document.activeElement)) return;
      const fragment = document.createDocumentFragment();
      state.roulette.options.forEach((option, index) => {
        const row = document.createElement("div");
        row.className = "probability-row";

        const label = document.createElement("span");
        label.textContent = option.label;

        const input = document.createElement("input");
        input.type = "number";
        input.min = "1";
        input.max = "999";
        input.step = "1";
        input.value = option.weight;
        input.inputMode = "numeric";
        input.dataset.rouletteWeightIndex = String(index);
        input.ariaLabel = `${option.label} 확률 가중치`;

        row.append(label, input);
        fragment.appendChild(row);
      });
      els.rouletteProbabilityList.replaceChildren(fragment);
    }

    function renderRouletteHistory() {
      if (!isControlView) return;
      const fragment = document.createDocumentFragment();
      if (!state.roulette.history.length) {
        const empty = document.createElement("li");
        empty.textContent = "아직 기록이 없습니다.";
        fragment.appendChild(empty);
      } else {
        state.roulette.history.slice(0, 10).forEach((item) => {
          const row = document.createElement("li");
          const label = document.createElement("span");
          const time = document.createElement("span");
          label.textContent = item.label;
          time.textContent = new Date(item.at).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
          row.append(label, time);
          fragment.appendChild(row);
        });
      }
      els.rouletteHistoryList.replaceChildren(fragment);
    }

    function getRemainingRouletteSpinDuration() {
      if (!state.roulette.spinning || !state.roulette.spinStartedAt) return 0;
      const elapsed = Date.now() - state.roulette.spinStartedAt;
      return Math.max(0, state.roulette.spinDuration - elapsed);
    }

    function renderRoulette() {
      const remainingDuration = getRemainingRouletteSpinDuration();
      document.documentElement.style.setProperty("--roulette-bg", getRouletteBackground());
      document.documentElement.style.setProperty("--roulette-rotation", `${state.roulette.rotation}deg`);
      document.documentElement.style.setProperty("--roulette-spin-duration", `${remainingDuration}ms`);

      if (!isControlView) return;

      els.rouletteStepCount.hidden = state.roulette.step !== "count";
      els.rouletteStepOptions.hidden = state.roulette.step !== "options";
      els.rouletteStepSpin.hidden = state.roulette.step !== "spin";
      els.rouletteCountValue.textContent = state.roulette.count;
      applyRouletteWheelStyle(els.rouletteCountWheel, 0);
      applyRouletteWheelStyle(els.rouletteControlWheel, remainingDuration);
      renderRouletteOptionInputs();
      renderRouletteProbabilityInputs();
      renderRouletteHistory();
      const result = state.roulette.resultIndex >= 0 ? state.roulette.options[state.roulette.resultIndex]?.label : "";
      els.rouletteResult.textContent = state.roulette.spinning ? "돌리는 중..." : (result ? `결과: ${result}` : "");
      els.rouletteSpinButton.disabled = state.roulette.spinning;
      els.rouletteSpinButton.textContent = state.roulette.spinning ? "돌리는 중..." : "원판 돌리기";
    }

    function render(fromRemote = false) {
      const currentSeconds = activeSeconds();
      lastRenderedSecond = Math.floor(currentSeconds);
      renderTimerText(formatTime(currentSeconds));
      els.timer.classList.toggle("urgent", state.mode === "down" && state.running && currentSeconds <= 10 && currentSeconds > 0);

      if (isControlView) {
        const displayUrl = `${location.origin}/display?room=${encodeURIComponent(room)}`;
        const rouletteUrl = `${location.origin}/roulette?room=${encodeURIComponent(room)}`;
        const controlUrl = `${location.origin}/control?room=${encodeURIComponent(room)}&key=${encodeURIComponent(controlKey)}`;
        els.displayUrl.value = displayUrl;
        els.rouletteUrl.value = rouletteUrl;
        els.controlUrl.value = controlUrl;
        els.toggleRun.textContent = state.running ? "일시정지" : "시작";
        els.modeButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.mode === state.mode);
        });
        els.fontSize.value = state.fontSize;
        els.outlineWidth.value = state.outlineWidth;
        els.outlineWidthValue.textContent = `${state.outlineWidth}px`;
        els.colorTargetButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.colorTargetButton === activeColorTarget);
        });
        els.textColorPreview.style.setProperty("--preview-color", state.textColor);
        els.outlineColorPreview.style.setProperty("--preview-color", state.outlineColor);
        if (document.activeElement !== els.activeColorHex) {
          setPickerFromHex(state[activeColorTarget]);
        } else {
          els.activeColorPreview.style.setProperty("--preview-color", state[activeColorTarget]);
        }
        els.showHours.checked = state.showHours;
        els.solidBg.checked = state.solidBg;
        els.bgOpacity.value = state.bgOpacity;
        els.bgOpacityValue.textContent = `${state.bgOpacity}%`;
        els.outputWidth.value = state.outputWidth;
        els.outputHeight.value = state.outputHeight;
        updateFontButtons();
        if ((!state.running || fromRemote) && !draftTimeDirty) {
          writeInputSeconds(currentSeconds);
        }
      }

      document.documentElement.style.setProperty("--text-color", state.textColor);
      document.documentElement.style.setProperty("--outline-color", state.outlineColor);
      document.documentElement.style.setProperty("--outline-width", `${state.outlineWidth}px`);
      document.documentElement.style.setProperty("--timer-size", `${state.fontSize}px`);
      document.documentElement.style.setProperty("--bg-opacity", String(state.bgOpacity / 100));
      document.documentElement.style.setProperty("--output-width", `${state.outputWidth}px`);
      document.documentElement.style.setProperty("--output-height", `${state.outputHeight}px`);
      document.documentElement.style.setProperty("--output-ratio", `${state.outputWidth} / ${state.outputHeight}`);
      applyTimerFont();
      document.body.classList.toggle("solid-bg", state.solidBg);
      renderRoulette();
      fitTimer();
    }

    function fitTimer() {
      els.timer.style.transform = "";
      els.timer.style.fontSize = `${state.fontSize}px`;
      const stage = els.timer.closest(".stage");
      const maxWidth = Math.max(80, (stage ? stage.clientWidth : window.innerWidth) * 0.94);
      const maxHeight = Math.max(44, (stage ? stage.clientHeight : window.innerHeight) * 0.78);
      const width = els.timer.scrollWidth;
      const height = els.timer.scrollHeight;
      const scale = Math.min(maxWidth / width, maxHeight / height);
      if (scale < 1) {
        const fittedSize = Math.max(24, Math.floor(state.fontSize * scale));
        els.timer.style.fontSize = `${fittedSize}px`;
      }
    }

    function syncAndRender() {
      saveState();
      render();
    }

    function setRunning(running) {
      freezeTime();
      state.running = Boolean(running);
      if (state.mode === "down" && state.remaining <= 0) {
        state.running = false;
      }
      state.lastStartedAt = Date.now();
      syncAndRender();
    }

    function setMode(mode) {
      freezeTime();
      state.mode = mode === "up" ? "up" : "down";
      if (state.mode === "down" && state.remaining <= 0) {
        state.remaining = state.duration;
      }
      state.lastStartedAt = Date.now();
      draftTimeDirty = false;
      writeInputSeconds(activeSeconds());
      syncAndRender();
    }

    function setColor(target, value) {
      freezeTime();
      state[target] = normalizeHex(value, state[target]);
      syncAndRender();
    }

    function applyTime() {
      const seconds = readInputSeconds();
      draftTimeDirty = false;
      freezeTime();
      state.duration = seconds;
      if (state.mode === "down") {
        state.remaining = seconds;
      } else {
        state.elapsed = seconds;
      }
      state.running = false;
      state.lastStartedAt = Date.now();
      syncAndRender();
    }

    function resetTime() {
      state.running = false;
      state.duration = 0;
      state.remaining = 0;
      state.elapsed = 0;
      state.lastStartedAt = Date.now();
      draftTimeDirty = false;
      writeInputSeconds(0);
      syncAndRender();
    }

    function jump(seconds) {
      freezeTime();
      draftTimeDirty = false;
      if (state.mode === "down") {
        state.remaining = Math.max(0, state.remaining + seconds);
        state.duration = Math.max(state.duration, state.remaining);
        writeInputSeconds(state.remaining);
      } else {
        state.elapsed = Math.max(0, state.elapsed + seconds);
        writeInputSeconds(state.elapsed);
      }
      state.lastStartedAt = Date.now();
      syncAndRender();
    }

    function setRouletteCount(count) {
      const nextCount = clampInt(count, 1, 15);
      const options = [...state.roulette.options];
      while (options.length < nextCount) {
        options.push({ label: `선택지 ${options.length + 1}`, weight: 1 });
      }
      state.roulette.count = nextCount;
      state.roulette.options = options.slice(0, nextCount);
      state.roulette.resultIndex = -1;
      state.roulette.visible = false;
      state.roulette.spinning = false;
      syncAndRender();
    }

    function confirmRouletteCount() {
      state.roulette.step = "options";
      state.roulette.resultIndex = -1;
      state.roulette.visible = false;
      state.roulette.spinning = false;
      syncAndRender();
    }

    function readRouletteOptionsFromInputs() {
      els.rouletteOptionInputs.querySelectorAll("[data-roulette-option-index]").forEach((input) => {
        const index = Number(input.dataset.rouletteOptionIndex);
        if (!state.roulette.options[index]) return;
        state.roulette.options[index].label = sanitizeRouletteLabel(input.value, `선택지 ${index + 1}`);
      });
    }

    function confirmRouletteOptions() {
      readRouletteOptionsFromInputs();
      state.roulette.step = "spin";
      state.roulette.resultIndex = -1;
      state.roulette.visible = true;
      state.roulette.spinning = false;
      syncAndRender();
    }

    function updateRouletteWeight(input) {
      const index = Number(input.dataset.rouletteWeightIndex);
      if (!state.roulette.options[index]) return;
      state.roulette.options[index].weight = clampNumber(input.value, 1, 999, 1);
      state.roulette.resultIndex = -1;
      syncAndRender();
    }

    function pickRouletteResultIndex() {
      const total = getRouletteTotalWeight();
      let target = Math.random() * total;
      for (let index = 0; index < state.roulette.options.length; index += 1) {
        target -= Math.max(1, Number(state.roulette.options[index].weight) || 1);
        if (target <= 0) return index;
      }
      return state.roulette.options.length - 1;
    }

    function getRouletteTargetRotation(resultIndex) {
      const current = Number(state.roulette.rotation) || 0;
      const currentMod = ((current % 360) + 360) % 360;
      const center = getRouletteSegmentCenter(resultIndex);
      const alignDelta = (360 - ((currentMod + center) % 360)) % 360;
      return current + (360 * 7) + alignDelta;
    }

    function addRouletteHistory(resultIndex) {
      const option = state.roulette.options[resultIndex];
      if (!option) return;
      state.roulette.history = [
        { label: option.label, at: Date.now() },
        ...state.roulette.history
      ].slice(0, 30);
    }

    function finishRouletteSpin() {
      if (!state.roulette.spinning) return;
      state.roulette.spinning = false;
      addRouletteHistory(state.roulette.resultIndex);
      syncAndRender();
    }

    function spinRoulette() {
      if (state.roulette.spinning || state.roulette.step !== "spin") return;
      const resultIndex = pickRouletteResultIndex();
      state.roulette.visible = true;
      state.roulette.spinning = true;
      state.roulette.spinStartedAt = Date.now();
      state.roulette.spinDuration = 5200;
      state.roulette.resultIndex = resultIndex;
      state.roulette.rotation = getRouletteTargetRotation(resultIndex);
      syncAndRender();
      window.setTimeout(finishRouletteSpin, state.roulette.spinDuration + 180);
    }

    function hideRouletteBroadcast() {
      state.roulette.visible = false;
      state.roulette.spinning = false;
      syncAndRender();
    }

    function resetRouletteSetup() {
      state.roulette = createDefaultRoulette();
      syncAndRender();
    }

    function bindController() {
      if (!isControlView) return;

      setTimerPanelCollapsed(readTimerPanelCollapsed(), false);

      els.timerPanelHeader.addEventListener("click", (event) => {
        if (event.target === els.timerCollapseButton) return;
        toggleTimerPanelCollapsed();
      });

      els.timerPanelHeader.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        toggleTimerPanelCollapsed();
      });

      els.timerCollapseButton.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleTimerPanelCollapsed();
      });

      els.stage.addEventListener("click", () => {
        toggleTimerPanelCollapsed();
      });

      els.rouletteCountPlus.addEventListener("click", () => setRouletteCount(state.roulette.count + 1));
      els.rouletteCountMinus.addEventListener("click", () => setRouletteCount(state.roulette.count - 1));
      els.rouletteConfirmCount.addEventListener("click", confirmRouletteCount);
      els.rouletteConfirmOptions.addEventListener("click", confirmRouletteOptions);
      els.rouletteSpinButton.addEventListener("click", spinRoulette);
      els.rouletteHideBroadcast.addEventListener("click", hideRouletteBroadcast);
      els.rouletteResetSetup.addEventListener("click", resetRouletteSetup);

      els.rouletteOptionInputs.addEventListener("input", (event) => {
        if (!event.target.matches("[data-roulette-option-index]")) return;
        const index = Number(event.target.dataset.rouletteOptionIndex);
        if (!state.roulette.options[index]) return;
        state.roulette.options[index].label = event.target.value.slice(0, 40);
      });

      els.rouletteOptionInputs.addEventListener("change", () => {
        readRouletteOptionsFromInputs();
        syncAndRender();
      });

      els.rouletteProbabilityList.addEventListener("input", (event) => {
        if (event.target.matches("[data-roulette-weight-index]")) {
          updateRouletteWeight(event.target);
        }
      });

      els.timeInputs.forEach((input) => {
        input.addEventListener("input", () => {
          draftTimeDirty = true;
        });

        input.addEventListener("blur", () => {
          const { min, max } = getTimeInputMeta(input.id);
          setTimeInputValue(input, input.value, min, max);
        });
      });

      let repeatTimeout = 0;
      let repeatInterval = 0;

      function stopTimeStepRepeat() {
        window.clearTimeout(repeatTimeout);
        window.clearInterval(repeatInterval);
        repeatTimeout = 0;
        repeatInterval = 0;
      }

      function runTimeStep(button) {
        stepTimeInput(button.dataset.timeStep, Number(button.dataset.step));
      }

      els.timeStepButtons.forEach((button) => {
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          button.dataset.pointerActive = "1";
          runTimeStep(button);
          stopTimeStepRepeat();
          repeatTimeout = window.setTimeout(() => {
            repeatInterval = window.setInterval(() => runTimeStep(button), 95);
          }, 330);
        });

        button.addEventListener("click", () => {
          if (button.dataset.pointerActive === "1") {
            button.dataset.pointerActive = "";
            return;
          }
          runTimeStep(button);
        });

        ["pointerup", "pointercancel", "pointerleave", "blur"].forEach((eventName) => {
          button.addEventListener(eventName, stopTimeStepRepeat);
        });
      });

      els.applyTime.addEventListener("click", applyTime);
      els.resetTime.addEventListener("click", resetTime);
      els.toggleRun.addEventListener("click", () => setRunning(!state.running));
      els.stopTimer.addEventListener("click", () => setRunning(false));

      let jumpRepeatTimeout = 0;
      let jumpRepeatInterval = 0;

      function stopJumpRepeat() {
        window.clearTimeout(jumpRepeatTimeout);
        window.clearInterval(jumpRepeatInterval);
        jumpRepeatTimeout = 0;
        jumpRepeatInterval = 0;
      }

      function runJump(button) {
        jump(Number(button.dataset.jump));
      }

      document.querySelectorAll("[data-jump]").forEach((button) => {
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          button.dataset.pointerActive = "1";
          runJump(button);
          stopJumpRepeat();
          jumpRepeatTimeout = window.setTimeout(() => {
            jumpRepeatInterval = window.setInterval(() => runJump(button), 115);
          }, 360);
        });

        button.addEventListener("click", () => {
          if (button.dataset.pointerActive === "1") {
            button.dataset.pointerActive = "";
            return;
          }
          runJump(button);
        });

        ["pointerup", "pointercancel", "pointerleave", "blur"].forEach((eventName) => {
          button.addEventListener(eventName, stopJumpRepeat);
        });
      });

      els.modeButtons.forEach((button) => {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      });

      const bindLiveRange = (input, update) => {
        let pointerActive = false;
        const run = () => update();

        input.addEventListener("input", run);
        input.addEventListener("change", run);
        input.addEventListener("pointerdown", () => {
          pointerActive = true;
          run();
        });
        input.addEventListener("pointermove", () => {
          if (pointerActive) run();
        });
        ["pointerup", "pointercancel", "pointerleave", "blur"].forEach((eventName) => {
          input.addEventListener(eventName, () => {
            if (pointerActive) run();
            pointerActive = false;
          });
        });
      };

      bindLiveRange(els.fontSize, () => {
        freezeTime();
        state.fontSize = Number(els.fontSize.value);
        syncAndRender();
      });

      bindLiveRange(els.outlineWidth, () => {
        freezeTime();
        state.outlineWidth = Number(els.outlineWidth.value);
        syncAndRender();
      });

      const updateOutputSize = () => {
        freezeTime();
        state.outputWidth = clampNumber(els.outputWidth.value, 120, 1920, defaults.outputWidth);
        state.outputHeight = clampNumber(els.outputHeight.value, 60, 1080, defaults.outputHeight);
        syncAndRender();
      };

      els.outputWidth.addEventListener("input", updateOutputSize);
      els.outputWidth.addEventListener("change", updateOutputSize);
      els.outputHeight.addEventListener("input", updateOutputSize);
      els.outputHeight.addEventListener("change", updateOutputSize);

      els.fontSelect.addEventListener("change", () => {
        freezeTime();
        state.fontFile = sanitizeFontFile(els.fontSelect.value);
        syncAndRender();
      });

      els.colorTargetButtons.forEach((button) => {
        button.addEventListener("click", () => {
          activeColorTarget = button.dataset.colorTargetButton;
          setPickerFromHex(state[activeColorTarget]);
          render();
        });
      });

      let colorPointerActive = false;

      els.colorSquare.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        colorPointerActive = true;
        els.colorSquare.setPointerCapture(event.pointerId);
        pickColorFromSquare(event);
      });

      els.colorSquare.addEventListener("pointermove", (event) => {
        if (colorPointerActive) pickColorFromSquare(event);
      });

      ["pointerup", "pointercancel", "pointerleave"].forEach((eventName) => {
        els.colorSquare.addEventListener(eventName, () => {
          colorPointerActive = false;
        });
      });

      bindLiveRange(els.hueSlider, () => {
        pickerHsv.h = Number(els.hueSlider.value);
        setColorFromPicker();
      });

      els.applyActiveColor.addEventListener("click", () => setColor(activeColorTarget, els.activeColorHex.value));
      els.activeColorHex.addEventListener("keydown", (event) => {
        if (event.key === "Enter") setColor(activeColorTarget, els.activeColorHex.value);
      });

      els.showHours.addEventListener("change", () => {
        freezeTime();
        state.showHours = els.showHours.checked;
        syncAndRender();
      });

      els.solidBg.addEventListener("change", () => {
        freezeTime();
        state.solidBg = els.solidBg.checked;
        syncAndRender();
      });

      bindLiveRange(els.bgOpacity, () => {
        freezeTime();
        state.bgOpacity = Number(els.bgOpacity.value);
        syncAndRender();
      });

      document.addEventListener("keydown", (event) => {
        const tagName = document.activeElement?.tagName;
        if (tagName === "INPUT") return;

        if (event.key === " ") {
          event.preventDefault();
          setRunning(!state.running);
        }
        if (event.key.toLowerCase() === "r") {
          resetTime();
        }
      });
    }

    function bindSync() {
      if (isServerMode) {
        fetchServerState();
        window.setInterval(fetchServerState, 700);
        window.addEventListener("resize", fitTimer);
        return;
      }

      if (channel) {
        channel.addEventListener("message", (event) => {
          if (event.data?.type === "state") {
            receiveState(event.data.state);
          }
        });
      }

      window.addEventListener("storage", (event) => {
        if (event.key === storageKey && event.newValue) {
          try {
            receiveState(JSON.parse(event.newValue));
          } catch {
            // Ignore malformed external writes.
          }
        }
      });

      window.addEventListener("resize", fitTimer);
    }

    function tick(now) {
      if (state.running) {
        const current = getCurrentTimes();
        if (state.mode === "down" && current.remaining <= 0) {
          state.remaining = 0;
          state.running = false;
          state.lastStartedAt = Date.now();
          saveState();
        }
      }

      if (isControlView && state.roulette.spinning && getRemainingRouletteSpinDuration() <= 0) {
        finishRouletteSpin();
      }

      const currentSecond = Math.floor(activeSeconds());
      if (currentSecond !== lastRenderedSecond || now - lastFrameAt > 1000) {
        render();
        lastFrameAt = now;
      }

      rafId = requestAnimationFrame(tick);
    }

    bindController();
    bindSync();
    loadFonts();
    writeInputSeconds(activeSeconds());
    render();
    saveState(false);
    rafId = requestAnimationFrame(tick);
    window.addEventListener("beforeunload", () => {
      cancelAnimationFrame(rafId);
      if (channel) channel.close();
    });
  </script>
</body>
</html>
